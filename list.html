<!doctype html>
<html>
  <head>
    <title>list elements</title>
  </head>
  <body>
    <h1>List items</h1>
    <h3>Unordered list</h3>
    <ul>
      <li>list item 1
        <ul><li>list item 1-1</li>
            <dl>list features</dl>
            <li>list item 1-2</li></ul>
      </li>
      <li>list item 2</li>
    </ul>
    <h3>Ordered list</h3>
    <ol start="2">
        <li>list item 1</li>
        <li>list item 2</li>
        <li>list item 3</li>
    </ol>
  </body>
</html>
